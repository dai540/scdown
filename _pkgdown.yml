url: https://dai540.github.io/scdown/

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: scdown
  description: Annotation-after downstream analysis for single-cell RNA-seq.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search]
  components:
    intro:
      text: Get Started
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
        - text: Getting Started
          href: articles/getting-started.html
        - text: Recommended Pipeline
          href: articles/recommended-pipeline.html

reference:
  - title: Object
    contents:
      - scdown
      - recommended_pipeline
      - scdown_example
      - summarize_dataset
      - collapse_lineage
      - build_scdown_report
      - run_core
  - title: Explore
    contents:
      - plot_map
      - explore_markers
      - find_markers
      - plot_gene
      - plot_composition
      - explore_composition
      - check_annotation
      - plot_signature
      - explore_signature
      - plot_heatmap
      - infer_communication
      - explore_communication
  - title: Test
    contents:
      - test_markers
      - test_composition
      - test_signature
      - test_communication
  - title: Resources
    contents:
      - immune_signatures
      - immune_marker_panels
      - default_lineage_mapping
      - list_signatures
      - get_signature

url: https://dai540.github.io/scdown/

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: scdown
  description: Minimal downstream analysis after cell annotation for single-cell RNA-seq.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search]
  components:
    intro:
      text: Get Started
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
        - text: Getting Started
          href: articles/getting-started.html
    news:
      text: News
      href: news/index.html

reference:
  - title: Object and workflow
    contents:
      - scdown
      - scdown_example
      - summarize_dataset
      - run_core
      - build_scdown_report
  - title: Downstream analysis
    contents:
      - plot_map
      - find_markers
      - check_annotation
      - plot_average_expression
      - plot_cluster_similarity
      - plot_signature
      - infer_communication
  - title: Built-in resources
    contents:
      - immune_signatures
      - immune_marker_panels
      - list_signatures
      - get_signature

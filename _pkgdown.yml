template:
  bootstrap: 5
  bootswatch: flatly

development:
  mode: release

url: https://dai540.github.io/scdown

home:
  title: scdown
  description: Minimal downstream analysis after cell annotation for single-cell RNA-seq.

repo:
  url:
    home: https://github.com/dai540/scdown
    source: https://github.com/dai540/scdown/blob/main
    issue: https://github.com/dai540/scdown/issues/
    user: https://github.com/

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [github, search]
  components:
    intro:
      text: Get Started
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fa-github
      href: https://github.com/dai540/scdown
      aria-label: GitHub repository

articles:
  - title: Core tutorials
    navbar: Core
    contents:
      - getting-started

reference:
  - title: Main workflows
    contents:
      - scdown
      - summarize_dataset
      - plot_map
      - find_markers
      - check_annotation
      - plot_average_expression
      - plot_cluster_similarity
      - plot_signature
      - infer_communication
      - run_core
      - build_scdown_report
  - title: Inputs and example data
    contents:
      - scdown_example
  - title: Built-in resources
    contents:
      - immune_signatures
      - immune_marker_panels
      - list_signatures
      - get_signature

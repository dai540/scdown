name: Bug report
description: Report a reproducible problem in scdown.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include a minimal reproducible example whenever possible.
  - type: input
    id: version
    attributes:
      label: scdown version
      placeholder: 0.4.2
    validations:
      required: true
  - type: textarea
    id: session
    attributes:
      label: Session info
      description: Paste `sessionInfo()` if available.
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Reproducible example
      description: Include the smallest code example that reproduces the issue.
      placeholder: |
        library(scdown)
        obj <- scdown(...)
        ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior or error
    validations:
      required: true
